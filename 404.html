<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Big Picture Planner</title>
    <script>
      // GitHub Pages serves this single root 404.html for every missing path.
      // For the planner SPA (served under /planner/), encode the requested
      // route into ?p= and bounce to /planner/ so its index.html can restore
      // the route. Anything else is a genuinely missing page -> send home.
      (function () {
        var l = window.location;
        var path = l.pathname;
        var BASE = '/planner/';
        if (path.indexOf(BASE) === 0) {
          var rest = path.slice(BASE.length); // path after /planner/
          l.replace(
            l.origin + BASE + '?p=' + encodeURIComponent(rest + l.search) + (l.hash || '')
          );
          return;
        }
        l.replace(l.origin + '/');
      })();
    </script>
  </head>
  <body></body>
</html>
